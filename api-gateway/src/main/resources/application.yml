server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**

        - id: game-service
          uri: ${GAME_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/games/**

        - id: leaderboard-service
          uri: ${LEADERBOARD_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/leaderboard/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/notifications/**,/ws/**

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
