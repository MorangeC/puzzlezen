<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parking Rush — PuzzleZen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --bg2:#13131a;
  --bg3:#1c1c26;
  --border:#2a2a38;
  --text:#f0f0f8;
  --muted:#6b6b85;
  --easy:#22c987;
  --hard:#e8445a;
  --accent:#7c6af7;
  --amber:#f5a623;
  --cell:72px;
  --gap:4px;
  --pad:10px;
  --font-head:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-mono);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:2rem 1rem;
  overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.2;pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.logo{font-family:var(--font-head);font-size:1.2rem;font-weight:800;margin-bottom:.3rem;position:relative;z-index:1}
.logo span{color:var(--accent)}
.back-link{font-size:.72rem;color:var(--muted);cursor:pointer;margin-bottom:2rem;position:relative;z-index:1;text-decoration:none;display:inline-block}
.back-link:hover{color:var(--text)}

/* ── LAYOUT ── */
.game-wrap{
  display:flex;gap:2rem;align-items:flex-start;
  position:relative;z-index:1;flex-wrap:wrap;justify-content:center;
}

/* ── BOARD ── */
.board-wrap{position:relative;flex-shrink:0}

.grid-bg{
  display:grid;
  grid-template-columns:repeat(6,var(--cell));
  grid-template-rows:repeat(6,var(--cell));
  gap:var(--gap);
  background:var(--bg3);
  padding:var(--pad);
  border-radius:12px;
  border:1px solid var(--border);
  position:relative;
}
.cell{
  background:var(--bg);
  border-radius:5px;
  width:var(--cell);
  height:var(--cell);
}

/* Exit slot on right side of row 2 (0-indexed) */
.exit-slot{
  position:absolute;
  right:calc(-2px - 32px);
  top:calc(var(--pad) + 2*(var(--cell) + var(--gap)));
  width:32px;
  height:var(--cell);
  display:flex;align-items:center;justify-content:center;
  color:var(--easy);font-size:1.3rem;
}
.exit-label{
  position:absolute;
  right:calc(-2px - 32px - 28px);
  top:calc(var(--pad) + 2*(var(--cell) + var(--gap)));
  width:28px;height:var(--cell);
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;color:var(--easy);letter-spacing:.05em;
  writing-mode:vertical-rl;text-transform:uppercase;
}

/* Row highlight for exit row */
.row-guide{
  position:absolute;
  left:var(--pad);
  top:calc(var(--pad) + 2*(var(--cell) + var(--gap)));
  width:calc(6*var(--cell) + 5*var(--gap));
  height:var(--cell);
  background:rgba(34,201,135,.04);
  border-radius:5px;
  pointer-events:none;
  border:1px dashed rgba(34,201,135,.15);
}

/* ── CARS ── */
.car{
  position:absolute;
  border-radius:8px;
  cursor:grab;
  display:flex;align-items:center;justify-content:center;
  transition:box-shadow .15s;
  user-select:none;
  touch-action:none;
  font-size:.65rem;
  font-weight:600;
  letter-spacing:.05em;
  z-index:10;
}
.car:active{cursor:grabbing;z-index:20}
.car.target{
  background:rgba(232,68,90,.2);
  border:2px solid var(--hard);
  color:var(--hard);
  box-shadow:0 0 16px rgba(232,68,90,.15);
}
.car.target.moving{box-shadow:0 0 28px rgba(232,68,90,.35)}
.car.c1{background:rgba(124,106,247,.18);border:2px solid rgba(124,106,247,.6);color:var(--accent)}
.car.c2{background:rgba(245,166,35,.15);border:2px solid rgba(245,166,35,.5);color:var(--amber)}
.car.c3{background:rgba(34,201,135,.12);border:2px solid rgba(34,201,135,.4);color:var(--easy)}
.car.c4{background:rgba(240,147,110,.15);border:2px solid rgba(240,147,110,.5);color:#f0936e}
.car.c5{background:rgba(99,179,237,.13);border:2px solid rgba(99,179,237,.45);color:#63b3ed}
.car.c6{background:rgba(246,173,85,.13);border:2px solid rgba(246,173,85,.45);color:#f6ad55}
.car.moving{transform:scale(1.04)}
.car.escaped{transition:left .4s ease-in,opacity .3s ease-in;opacity:0}

/* ── SIDE PANEL ── */
.panel{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  width:220px;
  flex-shrink:0;
}
.panel-title{font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:1.2rem}

.stat{margin-bottom:1rem}
.stat-label{font-size:.65rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.25rem}
.stat-value{font-family:var(--font-head);font-size:1.6rem;font-weight:700}
.stat-value.green{color:var(--easy)}
.stat-value.red{color:var(--hard)}

.timer-bar{background:var(--bg3);border-radius:4px;height:4px;margin-top:.4rem;overflow:hidden}
.timer-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .9s linear,background .3s}
.timer-fill.warn{background:var(--amber)}
.timer-fill.danger{background:var(--hard)}

.divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0}

.legend{display:flex;flex-direction:column;gap:.5rem}
.legend-row{display:flex;align-items:center;gap:.6rem;font-size:.72rem;color:var(--muted)}
.legend-car{width:28px;height:14px;border-radius:4px;flex-shrink:0}
.legend-target{background:rgba(232,68,90,.2);border:2px solid var(--hard)}
.legend-other{background:rgba(124,106,247,.18);border:2px solid rgba(124,106,247,.6)}

.btn{
  width:100%;background:none;border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:.6rem;font-family:var(--font-mono);font-size:.75rem;
  cursor:pointer;transition:border-color .2s,color .2s;margin-top:.8rem;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-family:var(--font-head);font-weight:700}
.btn.primary:hover{opacity:.85}

/* ── DIFFICULTY SELECTOR ── */
.diff-row{display:flex;gap:.5rem;margin-bottom:1rem}
.diff-btn{
  flex:1;padding:.4rem .3rem;border-radius:6px;border:1px solid var(--border);
  background:none;color:var(--muted);font-family:var(--font-mono);font-size:.68rem;cursor:pointer;
  transition:all .15s;
}
.diff-btn.active.easy{border-color:var(--easy);color:var(--easy);background:rgba(34,201,135,.08)}
.diff-btn.active.medium{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,.08)}
.diff-btn.active.hard{border-color:var(--hard);color:var(--hard);background:rgba(232,68,90,.08)}

/* ── MOVES HISTORY ── */
.moves-log{max-height:120px;overflow-y:auto;margin-top:.5rem}
.move-entry{font-size:.68rem;color:var(--muted);padding:.2rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.move-entry:last-child{color:var(--text)}

/* ── OVERLAY ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);
  z-index:100;display:none;align-items:center;justify-content:center;
}
.overlay.show{display:flex}
.result-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:2.5rem 2rem;text-align:center;max-width:340px;width:100%;
}
.result-icon{font-size:3rem;margin-bottom:1rem}
.result-title{font-family:var(--font-head);font-size:1.8rem;font-weight:800;margin-bottom:.5rem}
.result-sub{color:var(--muted);font-size:.8rem;margin-bottom:1.5rem;line-height:1.6}
.result-score{font-size:2.5rem;font-weight:700;color:var(--accent);margin-bottom:1.5rem;font-family:var(--font-head)}
.btn-row{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}

@media(max-width:600px){
  :root{--cell:52px;--gap:3px;--pad:8px}
  .panel{width:100%;max-width:460px}
  .game-wrap{gap:1rem}
}
</style>
</head>
<body>

<div class="logo">Puzzle<span>Zen</span></div>
<a class="back-link" onclick="history.back()">← Retour au menu</a>

<div class="game-wrap">

  <!-- BOARD -->
  <div class="board-wrap">
    <div class="grid-bg" id="grid">
      <!-- cells -->
      <div class="row-guide"></div>
    </div>
    <div class="exit-slot">→</div>
    <div class="exit-label">Sortie</div>
  </div>

  <!-- PANEL -->
  <div class="panel">
    <div class="panel-title">Parking Rush</div>

    <div class="stat">
      <div class="stat-label">Temps restant</div>
      <div class="stat-value" id="timer-display">3:00</div>
      <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    </div>

    <div class="stat">
      <div class="stat-label">Déplacements</div>
      <div class="stat-value" id="moves-display">0</div>
    </div>

    <hr class="divider">

    <div class="stat-label" style="margin-bottom:.5rem">Difficulté</div>
    <div class="diff-row">
      <button class="diff-btn active easy" onclick="setDifficulty('easy',this)">Facile</button>
      <button class="diff-btn medium" onclick="setDifficulty('medium',this)">Moyen</button>
      <button class="diff-btn hard" onclick="setDifficulty('hard',this)">Difficile</button>
    </div>

    <button class="btn primary" onclick="newGame()">Nouvelle partie</button>
    <button class="btn" onclick="showSolution()">Indice 💡</button>

    <hr class="divider">

    <div class="legend">
      <div class="stat-label" style="margin-bottom:.3rem">Légende</div>
      <div class="legend-row">
        <div class="legend-car legend-target"></div>
        <span>Voiture à sortir</span>
      </div>
      <div class="legend-row">
        <div class="legend-car legend-other"></div>
        <span>Autres véhicules</span>
      </div>
    </div>

    <hr class="divider">

    <div class="stat-label" style="margin-bottom:.3rem">Derniers mouvements</div>
    <div class="moves-log" id="moves-log">
      <div class="move-entry" style="color:var(--muted)">Aucun mouvement</div>
    </div>
  </div>

</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-icon" id="res-icon">🎉</div>
    <h2 class="result-title" id="res-title">Victoire !</h2>
    <p class="result-sub" id="res-sub">Tu as sorti la voiture rouge !</p>
    <div class="result-score" id="res-score">1240 pts</div>
    <div class="btn-row">
      <button class="btn primary" onclick="newGame();closeOverlay()">Rejouer</button>
      <button class="btn" onclick="closeOverlay()">Fermer</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────
const GRID = 6;
const EXIT_ROW = 2; // row where the target car must exit

// ── PUZZLES ──────────────────────────────────────────────────────
// Each car: { id, row, col, length, dir:'H'|'V', cls }
// Target car always id:'T', dir:'H', must reach col 4+ to escape
const PUZZLES = {
  easy: [
    {
      cars:[
        {id:'T',row:2,col:0,length:2,dir:'H',cls:'target'},
        {id:'A',row:0,col:2,length:2,dir:'V',cls:'c1'},
        {id:'B',row:3,col:0,length:2,dir:'H',cls:'c2'},
        {id:'C',row:4,col:3,length:2,dir:'H',cls:'c3'},
      ]
    },
    {
      cars:[
        {id:'T',row:2,col:1,length:2,dir:'H',cls:'target'},
        {id:'A',row:0,col:3,length:3,dir:'V',cls:'c1'},
        {id:'B',row:2,col:4,length:2,dir:'V',cls:'c2'},
        {id:'C',row:4,col:1,length:3,dir:'H',cls:'c3'},
      ]
    },
    {
      cars:[
        {id:'T',row:2,col:0,length:2,dir:'H',cls:'target'},
        {id:'A',row:0,col:2,length:3,dir:'V',cls:'c1'},
        {id:'B',row:3,col:3,length:2,dir:'H',cls:'c2'},
        {id:'C',row:1,col:4,length:2,dir:'V',cls:'c3'},
        {id:'D',row:4,col:0,length:2,dir:'H',cls:'c4'},
      ]
    },
  ],
  medium: [
    {
      cars:[
        {id:'T',row:2,col:0,length:2,dir:'H',cls:'target'},
        {id:'A',row:0,col:2,length:2,dir:'V',cls:'c1'},
        {id:'B',row:2,col:2,length:2,dir:'V',cls:'c2'},
        {id:'C',row:1,col:3,length:2,dir:'H',cls:'c3'},
        {id:'D',row:3,col:4,length:2,dir:'V',cls:'c4'},
        {id:'E',row:4,col:0,length:3,dir:'H',cls:'c5'},
      ]
    },
    {
      cars:[
        {id:'T',row:2,col:1,length:2,dir:'H',cls:'target'},
        {id:'A',row:0,col:1,length:2,dir:'V',cls:'c1'},
        {id:'B',row:0,col:3,length:3,dir:'V',cls:'c2'},
        {id:'C',row:2,col:3,length:2,dir:'V',cls:'c3'},
        {id:'D',row:1,col:4,length:2,dir:'H',cls:'c4'},
        {id:'E',row:4,col:2,length:2,dir:'H',cls:'c5'},
        {id:'F',row:5,col:0,length:3,dir:'H',cls:'c6'},
      ]
    },
  ],
  hard: [
    {
      cars:[
        {id:'T',row:2,col:0,length:2,dir:'H',cls:'target'},
        {id:'A',row:0,col:2,length:3,dir:'V',cls:'c1'},
        {id:'B',row:0,col:3,length:2,dir:'H',cls:'c2'},
        {id:'C',row:1,col:4,length:3,dir:'V',cls:'c3'},
        {id:'D',row:2,col:2,length:2,dir:'V',cls:'c4'},
        {id:'E',row:3,col:0,length:3,dir:'H',cls:'c5'},
        {id:'F',row:4,col:3,length:2,dir:'H',cls:'c6'},
        {id:'G',row:5,col:1,length:2,dir:'H',cls:'c1'},
        {id:'H',row:0,col:5,length:3,dir:'V',cls:'c2'},
      ]
    },
    {
      cars:[
        {id:'T',row:2,col:0,length:2,dir:'H',cls:'target'},
        {id:'A',row:0,col:0,length:2,dir:'V',cls:'c1'},
        {id:'B',row:0,col:2,length:2,dir:'H',cls:'c2'},
        {id:'C',row:1,col:2,length:3,dir:'V',cls:'c3'},
        {id:'D',row:0,col:4,length:2,dir:'V',cls:'c4'},
        {id:'E',row:2,col:3,length:2,dir:'V',cls:'c5'},
        {id:'F',row:3,col:0,length:2,dir:'H',cls:'c6'},
        {id:'G',row:4,col:2,length:3,dir:'H',cls:'c1'},
        {id:'H',row:5,col:0,length:2,dir:'H',cls:'c2'},
        {id:'I',row:3,col:5,length:3,dir:'V',cls:'c3'},
      ]
    },
  ]
};

const TIMERS = {easy:180, medium:120, hard:90};

// ── STATE ────────────────────────────────────────────────────────
let cars = [];
let difficulty = 'easy';
let moveCount = 0;
let timerMax = 180;
let timeLeft = 180;
let timerInterval = null;
let won = false;
let moveLog = [];
let hintUsed = false;

// ── COORDINATE HELPERS ───────────────────────────────────────────
function cellPx(idx) {
  const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 72;
  const gap  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))  || 4;
  const pad  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pad'))  || 10;
  return pad + idx * (cell + gap);
}
function pxToCell(px) {
  const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 72;
  const gap  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))  || 4;
  const pad  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pad'))  || 10;
  return Math.round((px - pad) / (cell + gap));
}
function carWidth(car) {
  const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 72;
  const gap  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))  || 4;
  return car.dir === 'H' ? car.length * cell + (car.length-1)*gap : cell;
}
function carHeight(car) {
  const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 72;
  const gap  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))  || 4;
  return car.dir === 'V' ? car.length * cell + (car.length-1)*gap : cell;
}

// ── COLLISION ────────────────────────────────────────────────────
function occupies(car) {
  const cells = [];
  for (let i = 0; i < car.length; i++) {
    cells.push(car.dir === 'H'
      ? {r: car.row, c: car.col + i}
      : {r: car.row + i, c: car.col});
  }
  return cells;
}

function isFree(car, newPos) {
  // newPos = { row, col } proposed position
  const moved = {...car, ...newPos};
  const movedCells = occupies(moved);

  // bounds check
  for (const {r,c} of movedCells) {
    if (r < 0 || r >= GRID || c < 0 || c >= GRID) return false;
  }

  // collision with other cars
  for (const other of cars) {
    if (other.id === car.id) continue;
    const otherCells = occupies(other);
    for (const mc of movedCells) {
      for (const oc of otherCells) {
        if (mc.r === oc.r && mc.c === oc.c) return false;
      }
    }
  }
  return true;
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');

  // Remove old cars
  grid.querySelectorAll('.car').forEach(e => e.remove());

  cars.forEach(car => {
    const el = document.createElement('div');
    el.className = `car ${car.cls}`;
    el.dataset.id = car.id;

    el.style.left   = cellPx(car.col) + 'px';
    el.style.top    = cellPx(car.row) + 'px';
    el.style.width  = carWidth(car) + 'px';
    el.style.height = carHeight(car) + 'px';

    if (car.id === 'T') {
      el.innerHTML = '<span style="font-size:1.2rem">🚗</span>';
    } else {
      el.textContent = car.id;
    }

    attachDrag(el, car);
    grid.appendChild(el);
  });
}

// ── DRAG ─────────────────────────────────────────────────────────
function attachDrag(el, carRef) {
  let startX, startY, startCol, startRow;

  function onDown(e) {
    if (won) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX;
    startY = pt.clientY;
    startCol = carRef.col;
    startRow = carRef.row;
    el.classList.add('moving');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend',  onUp);
  }

  function onMove(e) {
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 72;
    const gap  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))  || 4;
    const step = cell + gap;

    if (carRef.dir === 'H') {
      const dx = pt.clientX - startX;
      const deltaCells = Math.round(dx / step);
      const newCol = Math.max(0, Math.min(GRID - carRef.length, startCol + deltaCells));
      if (isFree(carRef, {col: newCol})) {
        carRef.col = newCol;
        el.style.left = cellPx(newCol) + 'px';
      }
    } else {
      const dy = pt.clientY - startY;
      const deltaCells = Math.round(dy / step);
      const newRow = Math.max(0, Math.min(GRID - carRef.length, startRow + deltaCells));
      if (isFree(carRef, {row: newRow})) {
        carRef.row = newRow;
        el.style.top = cellPx(newRow) + 'px';
      }
    }
  }

  function onUp() {
    el.classList.remove('moving');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);

    // snap check
    const finalPos = carRef.dir === 'H' ? carRef.col : carRef.row;
    const startPos = carRef.dir === 'H' ? startCol : startRow;
    if (finalPos !== startPos) {
      moveCount++;
      document.getElementById('moves-display').textContent = moveCount;
      const dir = carRef.dir === 'H'
        ? (finalPos > startPos ? '→' : '←')
        : (finalPos > startPos ? '↓' : '↑');
      logMove(`${carRef.id === 'T' ? '🚗' : carRef.id} ${dir} (${Math.abs(finalPos - startPos)})`);
      checkWin();
    }
  }

  el.addEventListener('mousedown',  onDown);
  el.addEventListener('touchstart', onDown, {passive:false});
}

// ── WIN CHECK ────────────────────────────────────────────────────
function checkWin() {
  const target = cars.find(c => c.id === 'T');
  if (!target) return;
  // target escapes when its right edge reaches col 4 (last col = 5, length 2 → col 4)
  if (target.row === EXIT_ROW && target.col >= GRID - target.length) {
    won = true;
    clearInterval(timerInterval);

    // animate escape
    const el = document.querySelector('[data-id="T"]');
    if (el) {
      const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 72;
      const gap  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))  || 4;
      const pad  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pad'))  || 10;
      el.classList.add('escaped');
      el.style.left = (pad + GRID*(cell+gap) + 40) + 'px';
    }

    setTimeout(() => showResult(true), 500);
  }
}

// ── RESULT ───────────────────────────────────────────────────────
function showResult(success) {
  const score = success
    ? Math.max(100, Math.round(timeLeft / timerMax * 800) + Math.max(0, 300 - moveCount * 5) + (hintUsed ? 0 : 200))
    : 0;

  document.getElementById('res-icon').textContent  = success ? '🎉' : '⏰';
  document.getElementById('res-title').textContent = success ? 'Sortie !' : 'Temps écoulé';
  document.getElementById('res-sub').textContent   = success
    ? `${moveCount} déplacements · ${formatTime(timerMax - timeLeft)} écoulées`
    : 'La voiture n\'a pas pu s\'échapper à temps.';
  document.getElementById('res-score').textContent = success ? score + ' pts' : '0 pts';
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// ── TIMER ────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = timerMax;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!won) showResult(false);
    }
  }, 1000);
}

function updateTimerUI() {
  document.getElementById('timer-display').textContent = formatTime(timeLeft);
  const pct = timeLeft / timerMax * 100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.className = 'timer-fill' + (pct < 20 ? ' danger' : pct < 40 ? ' warn' : '');
}

function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── LOG ──────────────────────────────────────────────────────────
function logMove(text) {
  moveLog.unshift(text);
  if (moveLog.length > 8) moveLog.pop();
  const log = document.getElementById('moves-log');
  log.innerHTML = moveLog.map((m,i) =>
    `<div class="move-entry">${m}</div>`
  ).join('');
}

// ── GAME CONTROL ─────────────────────────────────────────────────
function setDifficulty(diff, btn) {
  difficulty = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active','easy','medium','hard'));
  btn.classList.add('active', diff);
  newGame();
}

function newGame() {
  won = false;
  moveCount = 0;
  hintUsed = false;
  moveLog = [];
  document.getElementById('moves-display').textContent = '0';
  document.getElementById('moves-log').innerHTML = '<div class="move-entry" style="color:var(--muted)">Aucun mouvement</div>';

  const puzzleSet = PUZZLES[difficulty];
  const puzzle = puzzleSet[Math.floor(Math.random() * puzzleSet.length)];

  // Deep clone cars
  cars = puzzle.cars.map(c => ({...c}));
  timerMax = TIMERS[difficulty];
  timeLeft = timerMax;

  buildGrid();
  render();
  startTimer();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  // Clear, keep row-guide
  grid.innerHTML = '<div class="row-guide"></div>';
  // Add cells
  for (let i = 0; i < GRID * GRID; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    grid.appendChild(cell);
  }
}

function showSolution() {
  hintUsed = true;
  const target = cars.find(c => c.id === 'T');
  if (!target) return;

  // Simple hint: highlight the target car and show which cars block it
  const blockers = [];
  for (let col = target.col + target.length; col < GRID; col++) {
    const blocker = cars.find(c => {
      if (c.id === 'T') return false;
      return occupies(c).some(({r,c: cc}) => r === target.row && cc === col);
    });
    if (blocker && !blockers.find(b => b.id === blocker.id)) {
      blockers.push(blocker);
    }
  }

  const msg = blockers.length === 0
    ? '🚗 La voie est libre ! Glisse la voiture rouge vers la droite.'
    : `🔒 ${blockers.map(b=>b.id).join(', ')} ${blockers.length>1?'bloquent':'bloque'} la sortie. Déplace-${blockers.length>1?'les':'le'} d'abord !`;

  // Flash blocker cars
  blockers.forEach(b => {
    const el = document.querySelector(`[data-id="${b.id}"]`);
    if (el) {
      el.style.border = '2px solid var(--amber)';
      el.style.boxShadow = '0 0 16px rgba(245,166,35,.4)';
      setTimeout(() => {
        el.style.border = '';
        el.style.boxShadow = '';
      }, 2000);
    }
  });

  logMove('💡 ' + msg.slice(0,30) + (msg.length>30?'…':''));
  alert(msg);
}

// ── INIT ─────────────────────────────────────────────────────────
newGame();
</script>
