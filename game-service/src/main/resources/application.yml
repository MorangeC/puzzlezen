server:
  port: 8083

spring:
  application:
    name: game-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://puzzlezen:puzzlezen_secret@localhost:27017/game_db?authSource=admin}
      database: game_db

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


logging:
  level:
    com.puzzlezen: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    doc-expansion: none
    display-request-duration: true
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
