# ── game-service ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
  namespace: puzzlezen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-service
  template:
    metadata:
      labels:
        app: game-service
    spec:
      containers:
        - name: game-service
          image: ton-dockerhub/puzzlezen-game-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://puzzlezen:$(MONGO_PASSWORD)@mongodb:27017/game_db?authSource=admin"
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: puzzlezen-secrets
                  key: mongo-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: puzzlezen
spec:
  selector:
    app: game-service
  ports:
    - port: 8083
      targetPort: 8083
---
# ── auth-service ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: puzzlezen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ton-dockerhub/puzzlezen-auth-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/auth_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "puzzlezen"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: puzzlezen-secrets
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: puzzlezen-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: puzzlezen
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
---
# ── api-gateway ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: puzzlezen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ton-dockerhub/puzzlezen-api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"
            - name: USER_SERVICE_URL
              value: "http://user-service:8082"
            - name: GAME_SERVICE_URL
              value: "http://game-service:8083"
            - name: LEADERBOARD_SERVICE_URL
              value: "http://leaderboard-service:8084"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8085"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: puzzlezen
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
# ── Ingress (point d'entrée externe) ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: puzzlezen-ingress
  namespace: puzzlezen
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: puzzlezen.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
